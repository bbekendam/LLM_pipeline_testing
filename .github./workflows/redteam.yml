name: PromptFoo RedTeam Scan
 
on:
  push:
    branches:
      - '**'          # Trigger on push to ANY branch
  workflow_dispatch:  # Allow manual trigger from GitHub UI
 
permissions:
  contents: write     # Required to commit reports back to the repo
 
jobs:
  redteam:
    runs-on: ubuntu-latest
    timeout-minutes: 90   # Ollama model pulls can be slow
 
    env:
      MODEL_NAME: llama3
      PROMPTFOO_DISABLE_TELEMETRY: 1
      OLLAMA_HOST: http://127.0.0.1:11434
 
    steps:
      # ──────────────────────────────────────────────
      # 1. Check out the repository
      # ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
 
      # ──────────────────────────────────────────────
      # 2. Install & start Ollama
      # ──────────────────────────────────────────────
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
 
      - name: Start Ollama service
        run: |
          ollama serve &
          # Wait until the API is accepting connections
          echo "Waiting for Ollama to start..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:11434/ > /dev/null 2>&1; then
              echo "Ollama is up."
              break
            fi
            sleep 2
          done
 
      - name: Pull llama3 model
        run: ollama pull $MODEL_NAME
 
      # ──────────────────────────────────────────────
      # 3. Install Node.js & promptfoo
      # ──────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Install promptfoo
        run: npm install -g promptfoo
 
      # ──────────────────────────────────────────────
      # 4. Run the red-team scan
      # ──────────────────────────────────────────────
      - name: Generate red-team test cases
        run: |
          promptfoo redteam generate \
            --config redteam.yaml \
            --output redteam-tests.yaml
        env:
          MODEL_NAME: ${{ env.MODEL_NAME }}
 
      - name: Run red-team evaluation
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
          REPORT_STEM="reports/redteam-${TIMESTAMP}"
 
          promptfoo eval \
            --config redteam-tests.yaml \
            --output "${REPORT_STEM}.json" \
            --output-format json \
            --no-cache \
            --max-concurrency 5
 
          # Also export a human-readable HTML report
          promptfoo eval \
            --config redteam-tests.yaml \
            --output "${REPORT_STEM}.html" \
            --output-format html \
            --no-cache \
            --max-concurrency 5 || true   # Non-fatal if HTML fails
 
          echo "REPORT_STEM=${REPORT_STEM}" >> $GITHUB_ENV
        env:
          MODEL_NAME: ${{ env.MODEL_NAME }}
 
      # ──────────────────────────────────────────────
      # 5. Commit & push the reports back to the repo
      # ──────────────────────────────────────────────
      - name: Commit reports to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
 
          git add reports/
          git diff --cached --quiet && echo "No new reports to commit." && exit 0
 
          git commit -m "chore: add redteam report $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
      # ──────────────────────────────────────────────
      # 6. Upload reports as a GitHub Actions artifact
      #    (available even if the commit step fails)
      # ──────────────────────────────────────────────
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redteam-report-${{ github.run_id }}
          path: reports/
          retention-days: 30
