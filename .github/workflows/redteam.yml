name: PromptFoo RedTeam Scan

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  redteam:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # mistral + llama3 pulls add time

    env:
      PROMPTFOO_DISABLE_TELEMETRY: 1
      OLLAMA_HOST: http://127.0.0.1:11434

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ──────────────────────────────────────────────
      # Ollama — install, start, pull BOTH models
      # llama3   = target under test
      # mistral  = independent LLM-as-judge grader
      # ──────────────────────────────────────────────
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama service
        run: |
          ollama serve &
          echo "Waiting for Ollama..."
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:11434/ > /dev/null 2>&1 && echo "Ollama up." && break
            sleep 2
          done

      - name: Pull target model (llama3)
        run: ollama pull llama3

      - name: Pull grader model (mistral)
        run: ollama pull mistral

      # ──────────────────────────────────────────────
      # Node + promptfoo
      # ──────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install promptfoo
        run: npm install -g promptfoo

      # ──────────────────────────────────────────────
      # Generate adversarial test cases
      # ──────────────────────────────────────────────
      - name: Generate red-team test cases
        run: |
          promptfoo redteam generate \
            --config redteam.yaml \
            --output redteam-tests.yaml

      # ──────────────────────────────────────────────
      # Run evaluation — both JSON and HTML in one pass
      # --share publishes to promptfoo cloud for the
      # interactive NIST/OWASP heatmap web UI
      # ──────────────────────────────────────────────
      - name: Run red-team evaluation
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
          REPORT_STEM="reports/redteam-${TIMESTAMP}"
          mkdir -p reports

          promptfoo eval \
            --config redteam-tests.yaml \
            -o "${REPORT_STEM}.json" "${REPORT_STEM}.html" \
            --no-cache \
            --no-progress-bar \
            --max-concurrency 5 \
            --share 2>&1 | tee /tmp/eval-output.txt

          # Extract and save the shareable URL if one was generated
          SHARE_URL=$(grep -oP 'https://app\.promptfoo\.dev/\S+' /tmp/eval-output.txt | head -1 || true)
          if [ -n "$SHARE_URL" ]; then
            echo "## Red Team Report" > reports/LATEST_REPORT.md
            echo "Run: ${TIMESTAMP}" >> reports/LATEST_REPORT.md
            echo "Interactive report (NIST/OWASP heatmap): ${SHARE_URL}" >> reports/LATEST_REPORT.md
            echo "SHARE_URL=${SHARE_URL}" >> $GITHUB_ENV
          fi

          echo "REPORT_STEM=${REPORT_STEM}" >> $GITHUB_ENV

      # ──────────────────────────────────────────────
      # Post the shareable URL to the Actions summary page
      # ──────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## 🛡️ RedTeam Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          if [ -n "${SHARE_URL}" ]; then
            echo "**Interactive report (NIST/OWASP heatmap):** ${SHARE_URL}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**Local reports committed to:** \`reports/\`" >> $GITHUB_STEP_SUMMARY

      # ──────────────────────────────────────────────
      # Commit reports back to repo
      # ──────────────────────────────────────────────
      - name: Commit reports to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet && echo "No new reports." && exit 0
          git commit -m "chore: redteam report $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redteam-report-${{ github.run_id }}
          path: reports/
          retention-days: 30
