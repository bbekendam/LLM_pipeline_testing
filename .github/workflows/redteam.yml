name: PromptFoo RedTeam Scan

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  redteam:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PROMPTFOO_DISABLE_TELEMETRY: 1
      OLLAMA_HOST: http://127.0.0.1:11434
      # llama3.2:1b — 1.3 GB, single model for target + grader
      # ~10-15 sec/test on 2-core CPU vs ~4 min for llama3 8B
      MODEL: llama3.2:1b

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ env.MODEL }}

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama service
        run: |
          ollama serve &
          echo "Waiting for Ollama..."
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:11434/ > /dev/null 2>&1 && echo "Ollama up." && break
            sleep 2
          done

      # Single model pull — ~1.3 GB, cached after first run
      - name: Pull model (${{ env.MODEL }})
        run: ollama pull $MODEL

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install promptfoo
        run: npm install -g promptfoo

      - name: Generate red-team test cases
        run: |
          promptfoo redteam generate \
            --config redteam.yaml \
            --output redteam-tests.yaml

      - name: Run red-team evaluation
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
          mkdir -p reports

          promptfoo eval \
            --config redteam-tests.yaml \
            -o "reports/redteam-${TIMESTAMP}.json" \
               "reports/redteam-${TIMESTAMP}.html" \
            --no-cache \
            --no-progress-bar \
            --max-concurrency 2

          cp "reports/redteam-${TIMESTAMP}.html" reports/index.html
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV

      - name: Build report history index
        run: |
          python3 - << 'EOF'
          import os, glob, json

          reports = sorted(glob.glob("reports/redteam-*.json"), reverse=True)
          rows = []
          for rpt in reports[:20]:
              ts = os.path.basename(rpt).replace("redteam-","").replace(".json","")
              html_name = os.path.basename(rpt.replace(".json",".html"))
              try:
                  with open(rpt) as f:
                      d = json.load(f)
                  res = d.get("results",{}).get("results",[])
                  passed = sum(1 for r in res if r.get("success"))
                  total  = len(res)
                  color  = "green" if passed == total else ("orange" if passed/total > 0.8 else "red")
                  badge  = f'<span style="color:{color};font-weight:bold">{passed}/{total} passed</span>'
              except Exception:
                  badge = "—"
              rows.append(
                  f'<tr><td>{ts}</td><td>{badge}</td>'
                  f'<td><a href="{html_name}">interactive report</a></td>'
                  f'<td><a href="{os.path.basename(rpt)}">json</a></td></tr>'
              )

          html = """<!DOCTYPE html>
          <html><head><meta charset="utf-8">
          <title>AEGIS RedTeam Reports</title>
          <style>
            body{font-family:sans-serif;max-width:860px;margin:2rem auto;padding:0 1rem}
            h1{color:#1a1a2e}
            table{width:100%;border-collapse:collapse;margin-top:1rem}
            th,td{padding:.6rem 1rem;border:1px solid #ddd;text-align:left}
            th{background:#1a1a2e;color:#fff}
            tr:nth-child(even){background:#f5f5f5}
            a{color:#0066cc}
            .latest{margin:1rem 0;padding:1rem;background:#e8f4fd;border-radius:6px}
          </style></head>
          <body>
          <h1>🛡️ AEGIS RedTeam Report History</h1>
          <div class="latest"><a href="index.html">▶ View latest scan (interactive NIST/OWASP heatmap)</a></div>
          <table>
            <tr><th>Run timestamp</th><th>Result</th><th>Interactive report</th><th>Raw JSON</th></tr>
          """ + ("".join(rows) if rows else "<tr><td colspan=4>No reports yet</td></tr>") + """
          </table></body></html>"""

          with open("reports/history.html","w") as f:
              f.write(html)
          print(f"Index written — {len(rows)} report(s) listed.")
          EOF

      - name: Commit reports to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet && echo "No new reports." && exit 0
          git commit -m "chore: redteam report $TIMESTAMP [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Write job summary
        if: always()
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          echo "## 🛡️ RedTeam Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Model** | \`$MODEL\` (target + grader) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Latest report** | [${PAGES_URL}](${PAGES_URL}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **History** | [${PAGES_URL}/history.html](${PAGES_URL}/history.html) |" >> $GITHUB_STEP_SUMMARY

      - name: Upload artifact backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redteam-report-${{ github.run_id }}
          path: reports/
          retention-days: 30
