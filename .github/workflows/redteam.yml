name: PromptFoo RedTeam Scan

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write        # needed to deploy to GitHub Pages
  id-token: write     # needed by the pages deploy action

jobs:
  redteam:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PROMPTFOO_DISABLE_TELEMETRY: 1
      OLLAMA_HOST: http://127.0.0.1:11434
      TARGET_MODEL: llama3
      GRADER_MODEL: llama3.2:3b

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Cache Ollama models (avoids re-downloading 6.7 GB on every run) ──
      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ env.TARGET_MODEL }}-${{ env.GRADER_MODEL }}

      # ── Ollama ─────────────────────────────────────────────────────────────
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama service
        run: |
          ollama serve &
          echo "Waiting for Ollama..."
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:11434/ > /dev/null 2>&1 && echo "Ollama up." && break
            sleep 2
          done

      - name: Pull target model (${{ env.TARGET_MODEL }})
        run: ollama pull $TARGET_MODEL

      - name: Pull grader model (${{ env.GRADER_MODEL }})
        run: ollama pull $GRADER_MODEL

      # ── Node + promptfoo ───────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install promptfoo
        run: npm install -g promptfoo

      # ── Generate adversarial tests ─────────────────────────────────────────
      - name: Generate red-team test cases
        run: |
          promptfoo redteam generate \
            --config redteam.yaml \
            --output redteam-tests.yaml

      # ── Run evaluation ─────────────────────────────────────────────────────
      # No --share. HTML is self-contained (all JS/CSS embedded).
      # JSON is for archival / further analysis.
      - name: Run red-team evaluation
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
          mkdir -p reports

          promptfoo eval \
            --config redteam-tests.yaml \
            -o "reports/redteam-${TIMESTAMP}.json" \
               "reports/redteam-${TIMESTAMP}.html" \
            --no-cache \
            --no-progress-bar \
            --max-concurrency 5

          # Keep a stable filename that GitHub Pages always serves as "latest"
          cp "reports/redteam-${TIMESTAMP}.html" reports/index.html

          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV

      # ── Build a simple index listing all past reports ──────────────────────
      - name: Build reports index page
        run: |
          python3 - << 'EOF'
          import os, glob, json

          reports = sorted(glob.glob("reports/redteam-*.json"), reverse=True)
          rows = []
          for rpt in reports[:20]:          # show last 20
              ts = os.path.basename(rpt).replace("redteam-","").replace(".json","")
              html_file = rpt.replace(".json",".html")
              html_name = os.path.basename(html_file)
              # try to read pass/fail counts
              try:
                  with open(rpt) as f:
                      d = json.load(f)
                  res = d.get("results",{}).get("results",[])
                  passed = sum(1 for r in res if r.get("success"))
                  total  = len(res)
                  badge  = f'<span style="color:{"green" if passed==total else "red"}">{passed}/{total} passed</span>'
              except Exception:
                  badge = "—"
              rows.append(f'<tr><td>{ts}</td><td>{badge}</td>'
                          f'<td><a href="{html_name}">view report</a></td>'
                          f'<td><a href="{os.path.basename(rpt)}">json</a></td></tr>')

          html = f"""<!DOCTYPE html>
          <html><head><meta charset="utf-8">
          <title>AEGIS RedTeam Reports</title>
          <style>
            body{{font-family:sans-serif;max-width:800px;margin:2rem auto;padding:0 1rem}}
            h1{{color:#1a1a2e}} table{{width:100%;border-collapse:collapse}}
            th,td{{padding:.6rem 1rem;border:1px solid #ddd;text-align:left}}
            th{{background:#1a1a2e;color:#fff}} tr:nth-child(even){{background:#f5f5f5}}
            a{{color:#0066cc}}
          </style></head>
          <body>
          <h1>🛡️ AEGIS RedTeam Report History</h1>
          <p><a href="index.html">← Latest scan</a></p>
          <table><tr><th>Run</th><th>Result</th><th>HTML Report</th><th>Raw JSON</th></tr>
          {''.join(rows) if rows else '<tr><td colspan=4>No reports yet</td></tr>'}
          </table></body></html>"""

          with open("reports/history.html","w") as f:
              f.write(html)
          print("Index written.")
          EOF

      # ── Commit JSON + HTML reports back to the repo ───────────────────────
      - name: Commit reports to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet && echo "No new reports." && exit 0
          git commit -m "chore: redteam report $TIMESTAMP [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Deploy reports/ to GitHub Pages ───────────────────────────────────
      # Free, self-hosted inside your GitHub account.
      # URL: https://<your-org>.github.io/<repo-name>/
      # For private repos: only collaborators with repo access can view it.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ── Job summary (links to your own Pages URL, not promptfoo cloud) ────
      - name: Write job summary
        if: always()
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          echo "## 🛡️ RedTeam Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Target** | \`$TARGET_MODEL\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Grader** | \`$GRADER_MODEL\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Latest report** | [${PAGES_URL}](${PAGES_URL}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Report history** | [${PAGES_URL}/history.html](${PAGES_URL}/history.html) |" >> $GITHUB_STEP_SUMMARY

      # ── Artifact backup (also free, 30-day retention) ─────────────────────
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redteam-report-${{ github.run_id }}
          path: reports/
          retention-days: 30
